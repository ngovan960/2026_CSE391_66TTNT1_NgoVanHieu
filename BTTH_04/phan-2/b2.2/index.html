<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Đặt Hàng Trực Tuyến</h2>
    <form id="orderForm" novalidate>
        
        <div class="form-group">
            <label for="product">Tên sản phẩm</label>
            <select id="product" name="product">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="Áo">Áo</option>
                <option value="Quần">Quần</option>
                <option value="Giày">Giày</option>
            </select>
            <div class="error-msg" id="productError"></div>
        </div>

        <div class="form-group">
            <label for="quantity">Số lượng (1 - 99)</label>
            <input type="number" id="quantity" name="quantity" min="1" max="99">
            <div class="error-msg" id="quantityError"></div>
        </div>

        <div class="form-group total-group">
            <label>Tổng tiền tạm tính:</label>
            <div class="total-price" id="totalPriceDisplay">0 VNĐ</div>
        </div>

        <div class="form-group">
            <label for="deliveryDate">Ngày giao hàng</label>
            <input type="date" id="deliveryDate" name="deliveryDate">
            <div class="error-msg" id="dateError"></div>
        </div>

        <div class="form-group">
            <label for="address">Địa chỉ giao hàng (>= 10 ký tự)</label>
            <textarea id="address" name="address" rows="3"></textarea>
            <div class="error-msg" id="addressError"></div>
        </div>

        <div class="form-group">
            <label for="notes">Ghi chú (Tối đa 200 ký tự)</label>
            <textarea id="notes" name="notes" rows="3"></textarea>
            <div class="char-counter" id="charCounter">0/200</div>
            <div class="error-msg" id="notesError"></div>
        </div>

        <div class="form-group">
            <label>Phương thức thanh toán</label>
            <div class="radio-group">
                <label><input type="radio" name="payment" value="Thanh toán khi nhận hàng"> Thanh toán khi nhận hàng</label>
                <label><input type="radio" name="payment" value="Ví điện tử"> Ví điện tử</label>
            </div>
            <div class="error-msg" id="paymentError"></div>
        </div>

        <button type="submit" class="btn-submit">Đặt Hàng</button>
    </form>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Xác nhận đặt hàng</h3>
        <div id="summaryContent" class="summary-content">
            </div>
        <div class="modal-actions">
            <button id="btnCancel" class="btn-cancel">Hủy</button>
            <button id="btnConfirm" class="btn-confirm">Xác nhận</button>
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
